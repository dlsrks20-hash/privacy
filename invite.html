<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리의 계절 - 파트너 초대</title>
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; max-width: 480px; margin: 0 auto; padding: 40px 20px; text-align: center; background: linear-gradient(160deg, #fff0f3 0%, #ffe4d6 50%, #fce4ec 100%); min-height: 100vh; }
    h1 { color: #e91e63; font-size: 24px; }
    p { color: #5c2434; font-size: 16px; line-height: 1.6; }
    .btn { display: inline-block; padding: 14px 32px; background: linear-gradient(135deg, #e8577d, #f48fb1); color: white; border-radius: 16px; text-decoration: none; font-weight: bold; margin: 10px; box-shadow: 0 4px 16px rgba(232,87,125,0.35); }
    .heart { font-size: 64px; margin: 20px 0; }
  </style>
</head>
<body>
  <div class="heart">💕</div>
  <h1>우리의 계절 파트너 초대</h1>
  <p>앱을 실행하여 자동으로 파트너 연동을 진행합니다.<br>앱이 없으면 Play Store에서 다운로드해주세요.</p>

  <p id="status" style="color: #8b5e6b; font-size: 14px; margin-top: 30px;">앱을 여는 중...</p>

  <a id="appLink" class="btn" href="#">앱에서 열기</a>
  <a class="btn" href="https://play.google.com/store/apps/details?id=com.lovelogbook.app" style="background: linear-gradient(135deg, #757575, #9e9e9e);">Play Store</a>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');
      if (!code) { document.getElementById('status').textContent = '초대 코드가 없습니다.'; return; }
      var appUrl = 'com.lovelogbook.app://invite?code=' + encodeURIComponent(code);
      var playStoreUrl = 'https://play.google.com/store/apps/details?id=com.lovelogbook.app';
      document.getElementById('appLink').href = appUrl;
      setTimeout(function() { window.location.href = appUrl; }, 200);
      setTimeout(function() {
        if (!document.hidden) {
          document.getElementById('status').textContent = '앱이 설치되어 있지 않습니다. Play Store로 이동합니다...';
          setTimeout(function() { window.location.href = playStoreUrl; }, 1500);
        }
      }, 2500);
    })();
  </script>
</body>
</html>
